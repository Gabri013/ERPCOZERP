# Railway config — ERPCOZERP Backend
# Deploy: backend API no Railway (com PostgreSQL)

services:
  - type: web
    name: erpcozerp-backend
    env: docker
    dockerfilePath: apps/backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: erp-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: SEED_ENABLED
        value: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: erp-postgres
    plan: basic-256mb
    pgMajorVersion: 15
