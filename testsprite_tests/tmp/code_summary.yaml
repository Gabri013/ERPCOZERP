features:
  - name: User Login
    description: Authenticate via email/password and open the ERP dashboard
    files:
      - src/pages/Login.jsx
      - src/lib/AuthContext.jsx
      - src/services/authService.js
    entry_route: /login
    user_interactions:
      - Fill email input
      - Fill password input
      - Click "Entrar"
      - See success toast and be redirected to "/"
      - See inline error and toast if invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: GET
        endpoint: /api/auth/me
    auth_required: false
  - name: Session and Route Guarding
    description: Protect all application routes (except /login) by checking session and redirecting when needed
    files:
      - src/App.jsx
      - src/lib/AuthContext.jsx
      - src/services/authService.js
    entry_route: /
    user_interactions:
      - Open the app directly at "/"
      - See a loading spinner while auth is checked
      - Get redirected to login if not authenticated
    api_calls:
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/logout
    auth_required: true
  - name: Module Navigation (ERP Layout)
    description: Navigate across ERP modules via the main layout (sidebar/header) and open module pages
    files:
      - src/components/layout/ERPLayout.jsx
      - src/components/layout/Sidebar.jsx
      - src/components/layout/Header.jsx
      - src/App.jsx
    entry_route: /
    user_interactions:
      - Use the sidebar to open a module page (e.g. Vendas, Estoque, Produção, Financeiro)
      - Confirm the URL updates and the corresponding page loads
    api_calls: []
    auth_required: true
  - name: Dynamic Entities (Metadata-driven pages)
    description: Open a dynamic entity page by route parameter and interact with metadata-based UI
    files:
      - src/pages/dinamico/EntityDynamicPage.jsx
      - src/stores/metadataStore.js
      - src/lib/metadata/storage.js
    entry_route: /entidades/:codigo
    user_interactions:
      - Navigate to a specific entity page (e.g. /entidades/clientes)
      - Use filters/search (if available) and open an entity record
    api_calls: []
    auth_required: true
  - name: Sales Orders (Pedidos de Venda)
    description: View and manage sales orders with filtering and detail views
    files:
      - src/pages/vendas/PedidosVenda.jsx
      - src/services/pedidosService.js
      - src/services/api.js
    entry_route: /vendas/pedidos
    user_interactions:
      - Open sales orders list
      - Filter/search orders
      - Open order details (if available in UI)
    api_calls:
      - method: GET
        endpoint: /api/vendas/pedidos
      - method: POST
        endpoint: /api/vendas/pedidos
    auth_required: true
  - name: Finance (Accounts Receivable/Payable)
    description: Manage financeiro pages like Contas a Receber and Contas a Pagar
    files:
      - src/pages/financeiro/ContasReceber.jsx
      - src/pages/financeiro/ContasPagar.jsx
      - src/services/financeiroService.js
      - src/services/api.js
    entry_route: /financeiro/receber
    user_interactions:
      - Open accounts receivable page and inspect items
      - Open accounts payable page and inspect items
      - Apply filters and open detail dialogs (when available)
    api_calls:
      - method: GET
        endpoint: /api/financeiro/receber
      - method: GET
        endpoint: /api/financeiro/pagar
    auth_required: true
known_limitations:
  - issue: In Vite development mode, src/services/api.js returns mocked data and does not call real backend endpoints.
    location: src/services/api.js
    impact: UI flows may pass without a live backend; production behavior differs.
  - issue: Most routes are wrapped by permission checks (PermissaoRoute); missing permissions may block navigation depending on user profile.
    location: src/components/PermissaoRoute.jsx
    impact: Some module pages may be inaccessible for certain users during tests.
