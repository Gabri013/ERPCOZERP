name: Deploy to Railway
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Railway Login & Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token $RAILWAY_TOKEN
          railway up --service=erpcozerp-backend

      - name: Run Seeds
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run npm run prisma:seed
          railway run npm run seed:cozinca

      - name: Output URL
        run: |
          echo "✅ Deploy concluído!"
          echo "Backend URL: https://erpcozerp-backend.up.railway.app"
          echo "Frontend: https://erpcozerp.vercel.app"
