databases:
  - name: erp-postgres
    plan: basic-256mb

services:
  - type: web
    name: erp-backend
    runtime: docker
    dockerContext: apps/backend
    dockerfilePath: apps/backend/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: erp-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ENABLED
        value: true
