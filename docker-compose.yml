# Stack único: Postgres + Redis + API Prisma + SPA (nginx)
services:
  postgres:
    image: postgres:16
    container_name: erp_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: erpcoz
      POSTGRES_USER: erpcoz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erpcozpass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpcoz -d erpcoz"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLISH_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://erpcoz:${POSTGRES_PASSWORD:-erpcozpass}@postgres:5432/erpcoz
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set in .env)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DEFAULT_MASTER_PASSWORD: ${DEFAULT_MASTER_PASSWORD:-master123_dev}
      SEED_ENABLED: ${SEED_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && npm start"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
