services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: erpcoz
      MYSQL_USER: erpcoz
      MYSQL_PASSWORD: erpcozpass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_TYPE=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=erpcoz
      - MYSQL_PASSWORD=erpcozpass
      - MYSQL_DATABASE=erpcoz
      - MYSQL_SSL=false
      - PORT=3001
      - NODE_ENV=development
      - DEFAULT_MASTER_PASSWORD=master123_dev
      - DEFAULT_ADMIN_PASSWORD=admin123_dev
      - JWT_SECRET=dev_jwt_secret_change_me_please_12345
      - JWT_EXPIRES_IN=7d
      - REFRESH_TOKEN_EXPIRES_IN=30d
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm start"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  mysql_data:
    driver: local
