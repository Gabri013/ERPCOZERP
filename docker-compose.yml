services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_TYPE=mock
      - DB_PATH=/app/data/erpcoz.db
      - PORT=3001
      - NODE_ENV=development
      - DEFAULT_MASTER_PASSWORD=master123_dev
      - DEFAULT_ADMIN_PASSWORD=admin123_dev
      - JWT_SECRET=dev_jwt_secret_change_me_please_12345
      - JWT_EXPIRES_IN=7d
      - REFRESH_TOKEN_EXPIRES_IN=30d
    volumes:
      - backend_data:/app/data
      - ./backend/src:/app/src
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    depends_on:
      - backend
volumes:
  backend_data:
    driver: local
